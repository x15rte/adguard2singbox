name: Publish AdGuard rule-set

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

concurrency:
  group: publish-adguard-rules
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download AdGuard filter
        run: |
          curl -fL --retry 3 --retry-delay 5 \
            -o filter.txt \
            https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt

      - name: Install sing-box
        run: |
          curl -fsSL https://sing-box.app/install.sh | sh -s -- --beta

      - name: Convert to sing-box rule-set
        run: |
          sing-box rule-set convert --type adguard --output adguarddnsfilter.srs filter.txt

      - name: Verify artifact
        run: |
          test -s adguarddnsfilter.srs

      - name: Generate checksum
        run: |
          sha256sum adguarddnsfilter.srs > adguarddnsfilter.srs.sha256

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rules
          name: rules
          make_latest: true
          overwrite_files: true
          files: |
            adguarddnsfilter.srs
            adguarddnsfilter.srs.sha256
