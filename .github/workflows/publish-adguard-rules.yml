name: Publish AdGuard rule-set

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

concurrency:
  group: publish-adguard-rules
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download AdGuard filter
        run: |
          curl -fL --retry 3 --retry-delay 5 \
            -o filter.txt \
            https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt

      - name: Install latest sing-box with digest verification
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          latest_tag=$(gh api repos/SagerNet/sing-box/releases --jq 'map(select(.draft == false)) | .[0].tag_name')
          version="${latest_tag#v}"

          deb_arch=$(dpkg --print-architecture)
          case "$deb_arch" in
            amd64) sb_arch="amd64" ;;
            arm64) sb_arch="arm64" ;;
            *)
              echo "Unsupported architecture: $deb_arch"
              exit 1
              ;;
          esac

          asset="sing-box_${version}_linux_${sb_arch}.deb"

          expected_sha=$(gh api repos/SagerNet/sing-box/releases/tags/"$latest_tag" --jq '.assets[] | select(.name=="'"$asset"'") | .digest' | sed 's/^sha256://')
          asset_api_url=$(gh api repos/SagerNet/sing-box/releases/tags/"$latest_tag" --jq '.assets[] | select(.name=="'"$asset"'") | .url')

          test -n "$expected_sha"
          test "$expected_sha" != "null"
          test -n "$asset_api_url"
          test "$asset_api_url" != "null"

          gh api -H "Accept: application/octet-stream" "$asset_api_url" > "$asset"
          echo "$expected_sha  $asset" | sha256sum -c -
          sudo dpkg -i "$asset"
          rm -f "$asset"

      - name: Convert to sing-box rule-set
        run: |
          sing-box rule-set convert --type adguard --output adguarddnsfilter.srs filter.txt

      - name: Verify artifact
        run: |
          test -s adguarddnsfilter.srs

      - name: Generate checksum
        run: |
          sha256sum adguarddnsfilter.srs > adguarddnsfilter.srs.sha256

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh api -X PATCH repos/${GITHUB_REPOSITORY}/git/refs/tags/rules \
            -f sha="${GITHUB_SHA}" \
            -F force=true || \
          gh api -X POST repos/${GITHUB_REPOSITORY}/git/refs \
            -f ref="refs/tags/rules" \
            -f sha="${GITHUB_SHA}"

          release_id=$(gh api repos/${GITHUB_REPOSITORY}/releases/tags/rules --jq '.id' 2>/dev/null || true)
          if test -n "$release_id"; then
            gh api -X PATCH repos/${GITHUB_REPOSITORY}/releases/${release_id} \
              -f tag_name="rules" \
              -f target_commitish="${GITHUB_SHA}" \
              -f name="rules" \
              -F make_latest=true
          else
            gh api -X POST repos/${GITHUB_REPOSITORY}/releases \
              -f tag_name="rules" \
              -f target_commitish="${GITHUB_SHA}" \
              -f name="rules" \
              -f draft=false \
              -f prerelease=false \
              -F make_latest=true \
              -f generate_release_notes=false \
              -f body=""
          fi

          gh release upload rules \
            adguarddnsfilter.srs \
            adguarddnsfilter.srs.sha256 \
            --clobber
